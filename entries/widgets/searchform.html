<!DOCTYPE html>
<html lang="da" style="background: white">
  <head>
    <meta charset="utf-8" />
    <title>NemPubMed</title>
    <meta name="viewport" content="initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, width=device-width" />
    <link rel="stylesheet" media="all" href="https://videncenterfordiabetes.dk/css/bundle.css" />

    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/remixicon@4.9.1/fonts/remixicon.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/vue-multiselect/dist/vue-multiselect.min.css"
    />
  </head>
  <body style="background: white">
    <div style="width: 886px; max-width: 100%; margin: auto; padding: 15px">
      <!--
        SearchForm settings (HTML data-attributes)
        -------------------------------------------
        All data-* attributes are optional and act as defaults. URL parameters can override some
        of these (see URL parameters section below).

        Core settings:
        - data-domain: Selects the content domain (e.g. "diabetes"). Empty string uses default.
        - data-language: UI language ("dk" or "en").
        - data-ai-url: Optional URL for "read more about AI" links shown in disclaimers.
          Supports absolute URLs (e.g. "https://example.com/om-ai") and relative URLs
          (e.g. "/om-ai" or "../om-ai"), resolved relative to the page where the widget is embedded.
        - data-use-a-i: Enable AI translation toggle ("true" or "false").
        - data-use-a-i-summarizer: Enable AI summarizer ("true" or "false").
        - data-use-mesh-validation: Enable MeSH term validation via NLM E-utilities ("true" or "false").
          When enabled, AI-translated [mh] terms are validated against NLM's MeSH database.
        - data-debug-search-flow: Enable detailed hierarchical search-flow debug logs in the browser console
          ("true" or "false"). Default is off and should normally stay off outside troubleshooting.
        - data-translation-sources: Array of database ids that may be shown/selected in the UI.
          PubMed can be included explicitly for clarity and is used as fallback when no explicit default is given.
          Supported values: 'pubmed', 'pubmedBestMatch', 'semanticScholar', 'openAlex', 'elicit'.
          `pubmedBestMatch` is accepted for backwards compatibility and normalizes to `pubmed`.
          Example: "['pubmed','semanticScholar','openAlex','elicit']"
        - data-default-translation-sources: Array of database ids selected by default.
          If omitted, only `pubmed` is selected by default.
          Example: "['pubmed','openAlex']"
        - data-show-elicit-unlock-button: Show a lock icon on the Elicit option when the Elicit
          source is gated by the backend (QPM_ELICIT_UNLOCK configured on the server). In simple
          mode the Elicit checkbox appears greyed out with a lock icon next to it; in advanced
          mode the Elicit entry is added to the database dropdown list (greyed out with a lock
          icon) even though it cannot be selected. Clicking the locked entry or the icon opens
          a prompt for the unlock code and remembers it in localStorage. IP-based unlock and
          URL-based ?elicitKey= always work regardless of this attribute.
          Default: "false" (no lock icon is shown).
        - data-show-process-details-toggles: Show "Detaljer"/"Details" toggles next to
          completed search-process steps ("true" or "false"). Default: "true".
        - data-open-limits: Show simple limits section from the start ("true" or "false").
        - data-component-no: Numeric identifier used to build a unique DOM id (SearchForm_<no>).
          Useful when multiple instances are embedded on the same page.

        Simple mode limits (only affects simple search):
        - data-hide-limits: Array of limit IDs to hide (e.g. ['L010020']).
          You can also pass a group id (e.g. 'L010') to hide all limits in that category.
        - data-check-limits: Array of limit IDs to preselect (overrides standardSimple defaults).
        - data-order-limits: Array of limit IDs to define display order in simple mode.
          IDs not listed will appear after the specified ones in their existing order.

        Topics:
        - data-hide-topics: Array of topic IDs to hide in topic dropdowns.

        Standard string for free-text search:
        - data-standard-string-add: When "true", the domain's standardString (from topics runtime content)
          is appended to all free-text (manual) search terms as: (user free text) AND (standardString).
          If the domain has no standardString (missing or empty in the topic file), nothing is added.
        - data-standard-string: Optional custom standardString text.
          If set, it is used as standardString (overrides domain standardString) and also works when data-domain is empty.
        - data-standard-string-scope: Which standardString variant to use: "narrow", "normal", or "broad".
          Only relevant when data-standard-string-add="true". Default is "normal" if omitted.

        Format for list attributes:
        - Must be a JSON-like array string using single quotes, e.g. "['L010010','L010020']".
        - Empty strings are ignored.

        URL parameters (case-insensitive keys, IDs are matched case-insensitively)
        ------------------------------------------------------------------------
        Standard app parameters:
        - topic: Selected topics. Use "ID#scope" and separate multiple with ";;".
          Example: topic=L10010#s;;L20020#n
          scope: n = narrow, s = standard, b = broad
        - advanced: true|false (advanced search mode)
        - sort: sort method key
        - collapsed: true|false (collapse the search form)
        - pagesize: number of results per page
        - pmid: preselected PMID-AI ids, separated by ";;"
        - scrollto: anchor id to scroll to (without #)
        - qpmDebug=searchflow: turns on the hierarchical search-flow debug mode in the browser console.
          Can be combined with normal search parameters and also works through hash-based embeds.

        Simple mode extras:
        - openlimits: true|false. When true, show limits section even without selected topics.
          Does NOT auto-run a search by itself.
        - hidelimits: list of limit IDs to hide (overrides data-hide-limits).
          You can also pass a group id (e.g. L010) to hide all limits in that category.
        - checklimits: list of limit IDs to preselect (overrides data-check-limits)
        - orderlimits: list of limit IDs to order (overrides data-order-limits)

        Limits by group id:
        - Any filter group ID can be used as a parameter, e.g.
          L010=L010010#s;;L010030#s

        Case rules:
        - URL parameter names are case-insensitive.
        - IDs are matched case-insensitively, but generated URLs use uppercase (L..., S...).

        Example URLs:
        - Open simple limits with defaults, no auto-search:
          ?openlimits=true&checklimits=L010010&hidelimits=L010030&orderlimits=L010020;;L010010
        - Full search with topics and a limit group:
          ?topic=L10010#s;;L20020#n&advanced=false&L010=L010010#s;;L010030#s&sort=relevance&pagesize=25
      -->
      <div
        id="qpm-searchform-1"
        class="qpm-searchform"
        data-domain="template"
        data-ai-url="/om-nempubmed"
        data-use-a-i="true"
        data-use-a-i-summarizer="true"
        data-use-mesh-validation="true"
        data-debug-search-flow="false"
        data-translation-sources="['pubmed','semanticScholar','openAlex','elicit']"
        data-default-translation-sources="['pubmed','semanticScholar','openAlex']"
        data-show-elicit-unlock-button="true"
        data-show-process-details-toggles="true"
        data-hide-topics="['L10010']"
        data-open-limits="true"
        data-hide-limits="" 
        data-check-limits=""
        data-order-limits=""
        data-standard-string-add="true"
        data-standard-string=""
        data-standard-string-scope="normal"
        data-language="dk"
        data-component-no="1"
      ></div>
      <div
        id="qpm-searchform-2"
        class="qpm-searchform"
        data-domain=""
        data-use-a-i="true"
        data-use-a-i-summarizer="true"
        data-use-mesh-validation="true"
        data-debug-search-flow="false"
        data-translation-sources="['pubmed','semanticScholar','openAlex','elicit']"
        data-default-translation-sources="['pubmed','semanticScholar']"
        data-open-limits="false"
        data-hide-limits="['L010030']" 
        data-check-limits="['L010020','L010030']"
        data-order-limits="['L010030','L010020','L010010']"
        data-standard-string-add="true"
        data-standard-string="diabet*[tiab]"
        data-standard-string-scope="normal"
        data-language="dk"
        data-component-no="2"
      ></div>
    </div>
    <script type="module" src="../scripts/SearchForm.js"></script>
  </body>
</html>
