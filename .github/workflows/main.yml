name: 🚀 Deploy Website on Push

on:
  push:
    branches:
      - dev
    tags:
      - 'v*.*.*'
      
jobs:
  build-and-deploy:
    name: 🛠️ Build and Deploy
    runs-on: ubuntu-latest
    env:
      DEPLOY_ROOT: ${{ github.ref == 'refs/heads/dev' && './dev/latest' || './current' }}

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ✅ Verify production tag is on main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '23'
          cache: 'npm'

      - name: 🧹 Clean npm Cache and Reinstall Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: 🏗️ Build Project
        env:
            ### General Environment Variables
            VITE_ABOUT_AI_URL: ${{ secrets.VITE_ABOUT_AI_URL }}
            VITE_CLIENT_NAME: ${{ secrets.VITE_CLIENT_NAME }}
            ### NLM Environment Variables (only myncbishare needed client-side)
            VITE_MY_NCBI_SHARE: ${{ secrets.VITE_MY_NCBI_SHARE }}
            ### OpenAI/API settings (API keys are in server-side config.php)
            VITE_LONG_ABSTRACT_LENGTH_LIMIT: ${{ secrets.VITE_LONG_ABSTRACT_LENGTH_LIMIT }}
            VITE_WAIT_TIME_DISCLAIMER_DELAY: ${{ secrets.VITE_WAIT_TIME_DISCLAIMER_DELAY }}
            ### Unpaywall Environment Variables
            VITE_UNPAYWALL_URL: ${{ secrets.VITE_UNPAYWALL_URL }}
            VITE_UNPAYWALL_EMAIL: ${{ secrets.VITE_UNPAYWALL_EMAIL }}

        run: npm run build

      - name: 📂 Deploy dist to FTP Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ env.DEPLOY_ROOT }}/
          protocol: ftp  
          exclude: |
             .git*
             node_modules
             *.map
             *.env

      - name: 📂 Deploy backend to FTP Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: ${{ env.DEPLOY_ROOT }}/backend/
          protocol: ftp
          exclude: |
             config.php
             config/config.php
             runtime/**
             *.lock

      - name: 📂 Deploy public API to FTP Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public-api/
          server-dir: ${{ env.DEPLOY_ROOT }}/public-api/
          protocol: ftp
          state-name: .ftp-deploy-sync-state-public-api.json
          exclude: |
             .git*
             *.map

      - name: 📂 Deploy entries to FTP Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Deploys whole entries tree, including entries/widgets/*.html
          local-dir: ./entries/
          server-dir: ${{ env.DEPLOY_ROOT }}/entries/
          protocol: ftp
          exclude: |
             .git*
             *.map

      - name: 📂 Deploy shared content data to FTP Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Scope deploy strictly to shared content only.
          local-dir: ./data/content/shared/
          server-dir: ${{ env.DEPLOY_ROOT }}/data/content/shared/
          protocol: ftp
          state-name: .ftp-deploy-sync-state-data-shared.json
          dangerous-clean-slate: false
          exclude: |
             history/**
             **/history/**

      - name: 📂 Deploy template content data to FTP Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Scope deploy strictly to template content only.
          local-dir: ./data/content/template/
          server-dir: ${{ env.DEPLOY_ROOT }}/data/content/template/
          protocol: ftp
          state-name: .ftp-deploy-sync-state-data-template.json
          dangerous-clean-slate: false
          exclude: |
             history/**
             **/history/**