name: 🚀 Deploy Website on Push

on:
  push:
    tags:
      - 'v*.*.*'
      
jobs:
  build-and-deploy:
    name: 🛠️ Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '23'
          cache: 'npm'

      - name: 🧹 Clean npm Cache and Reinstall Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: 🏗️ Build Project
        env:
            ### General Environment Variables
            VITE_ABOUT_AI_URL: ${{ secrets.VITE_ABOUT_AI_URL }}
            VITE_CLIENT_NAME: ${{ secrets.VITE_CLIENT_NAME }}
            ### NLM Environment Variables (only myncbishare needed client-side)
            VITE_MY_NCBI_SHARE: ${{ secrets.VITE_MY_NCBI_SHARE }}
            ### OpenAI/API settings (API keys are in server-side config.php)
            VITE_LONG_ABSTRACT_LENGTH_LIMIT: ${{ secrets.VITE_LONG_ABSTRACT_LENGTH_LIMIT }}
            VITE_WAIT_TIME_DISCLAIMER_DELAY: ${{ secrets.VITE_WAIT_TIME_DISCLAIMER_DELAY }}
            ### Unpaywall Environment Variables
            VITE_UNPAYWALL_URL: ${{ secrets.VITE_UNPAYWALL_URL }}
            VITE_UNPAYWALL_EMAIL: ${{ secrets.VITE_UNPAYWALL_EMAIL }}

        run: npm run build

      - name: 📂 Deploy dist to FTP Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          protocol: ftp  
          exclude: |
             .git*
             node_modules
             *.map
             *.env

      - name: 📂 Deploy backend to FTP Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: ./backend/
          protocol: ftp
          exclude: |
             config.php
             config/config.php
             config.example.php
             config/config.example.php
             runtime/**
             *.lock

      - name: 📂 Deploy entries to FTP Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Deploys whole entries tree, including entries/widgets/*.html
          local-dir: ./entries/
          server-dir: ./entries/
          protocol: ftp
          exclude: |
             .git*
             *.map

      - name: 📂 Deploy data to FTP Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./data/
          server-dir: ./data/
          protocol: ftp
          exclude: |
             history/**
             **/history/**
             config/**
             **/config/**
             *.example.json
             **/*.example.json
             cache/**
             runtime/**
             **/*config*.json